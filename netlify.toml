[build]
  publish = "."

[[redirects]]
  from = "/demande-envoyee"
  to = "/demande-envoyee.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache long des statiques (CSS/JS versionnes par ?v=, polices a noms stables)
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[redirects]]
  from = "/traitement-vrillette"
  to = "/entreprise-xylophages.html"
  status = 301

[[redirects]]
  from = "/traitement-vrillette.html"
  to = "/entreprise-xylophages.html"
  status = 301
