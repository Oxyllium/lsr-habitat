[build]
  publish = "."

[[redirects]]
  from = "/demande-envoyee"
  to = "/demande-envoyee.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/traitement-vrillette"
  to = "/entreprise-xylophages.html"
  status = 301

[[redirects]]
  from = "/traitement-vrillette.html"
  to = "/entreprise-xylophages.html"
  status = 301
